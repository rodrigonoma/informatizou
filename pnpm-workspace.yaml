packages:
  - 'packages/*'
  - 'apps/*'

# Dependências cujos build scripts têm permissão para rodar.
# esbuild: usado por vitest/tsx (binário nativo).
# prisma/@prisma/*: geram o client e baixam engines.
allowBuilds:
  esbuild: true
  prisma: true
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  # Acelerador nativo opcional do msgpackr (BullMQ). Funciona sem ele.
  msgpackr-extract: false
  # File watcher nativo do Nuxt (HMR) e shim vue-demi (Pinia/vue-query).
  '@parcel/watcher': true
  vue-demi: true
