# Compose de deploy ISOLADO para a VPS compartilhada (72.60.63.64).
# Esta VPS hospeda outros sites de produção (flowra/voicenav/cobrio) — este stack
# NÃO publica portas conflitantes e NÃO inclui nginx/certbot (o nginx do host
# roteará os subdomínios do informatizou após o DNS apontar).
#
# Portas de app publicadas apenas em 127.0.0.1 (acessíveis pelo nginx do host).
# Infra (postgres/redis/minio) fica só na rede interna do compose.
#
# Subir:  docker compose -f docker-compose.vps.yml up -d --build

name: informatizou

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
      POSTGRES_DB: informatizou
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 12
    restart: always

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 12
    restart: always

  minio:
    image: minio/minio:latest
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?defina MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?defina MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    restart: always

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.node
    command: >
      sh -c "pnpm --filter @informatizou/database db:migrate:deploy &&
             pnpm --filter @informatizou/api start"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/informatizou
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - '127.0.0.1:18040:4000'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: always

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/informatizou
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      api: { condition: service_started }
    restart: always

  admin-web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.nuxt
      args:
        APP: admin-web
    environment:
      NUXT_PUBLIC_API_BASE: https://api.informatizou.com.br
    ports:
      - '127.0.0.1:18031:3000'
    restart: always

  public-web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.nuxt
      args:
        APP: public-web
    environment:
      # O painel do cliente (área logada em /painel) chama a API pública no navegador.
      NUXT_PUBLIC_API_BASE: https://api.informatizou.com.br
      # Login com Google (opcional): defina GOOGLE_OAUTH_CLIENT_ID no .env para exibir o botão.
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
    ports:
      - '127.0.0.1:18030:3000'
    restart: always

  demo-renderer:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.nuxt
      args:
        APP: demo-renderer
    environment:
      API_BASE_URL: http://api:4000
    ports:
      - '127.0.0.1:18032:3000'
    restart: always

volumes:
  pg_data:
  redis_data:
  minio_data:
