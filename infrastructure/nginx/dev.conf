# Nginx de desenvolvimento — roteia os subdomínios *.localhost (spec §42).
# Acesse via http://app.localhost:8080, http://api.localhost:8080, etc.

upstream api_upstream { server api:4000; }
upstream admin_upstream { server admin-web:3000; }
upstream public_upstream { server public-web:3000; }
upstream demo_upstream { server demo-renderer:3000; }

server {
  listen 80;
  server_name api.localhost;
  location / {
    proxy_pass http://api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name app.localhost;
  location / {
    proxy_pass http://admin_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80 default_server;
  server_name www.localhost localhost;
  location / {
    proxy_pass http://public_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name demo.localhost;
  location / {
    proxy_pass http://demo_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Preserva o cabeçalho de compliance vindo do upstream.
    proxy_pass_header X-Robots-Tag;
  }
}
