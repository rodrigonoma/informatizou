# Nginx de PRODUÇÃO — Informatizou (spec §42).
# Roteia www/app/api/demo com HTTPS e redirect de HTTP. Certificados via Certbot.
# Emita os certificados na primeira vez com:
#   docker compose -f docker-compose.production.yml run --rm certbot certonly \
#     --webroot -w /var/www/certbot -d www.informatizou.com.br -d app.informatizou.com.br \
#     -d api.informatizou.com.br -d demo.informatizou.com.br

upstream api_upstream { server api:4000; }
upstream admin_upstream { server admin-web:3000; }
upstream public_upstream { server public-web:3000; }
upstream demo_upstream { server demo-renderer:3000; }

# Segurança comum
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# HTTP → desafio ACME + redirect para HTTPS
server {
  listen 80;
  server_name www.informatizou.com.br app.informatizou.com.br api.informatizou.com.br demo.informatizou.com.br;

  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

# Bloco reutilizável de headers de segurança
# (aplicado por server para permitir CSP específica por app na evolução)

server {
  listen 443 ssl;
  http2 on;
  server_name api.informatizou.com.br;
  ssl_certificate /etc/letsencrypt/live/www.informatizou.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.informatizou.com.br/privkey.pem;
  client_max_body_size 20m;

  location / {
    proxy_pass http://api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name app.informatizou.com.br;
  ssl_certificate /etc/letsencrypt/live/www.informatizou.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.informatizou.com.br/privkey.pem;

  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;

  location / {
    proxy_pass http://admin_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name www.informatizou.com.br;
  ssl_certificate /etc/letsencrypt/live/www.informatizou.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.informatizou.com.br/privkey.pem;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location / {
    proxy_pass http://public_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name demo.informatizou.com.br;
  ssl_certificate /etc/letsencrypt/live/www.informatizou.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.informatizou.com.br/privkey.pem;

  location / {
    proxy_pass http://demo_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Nunca indexar demonstrações (§20) — preserva o header do upstream.
    proxy_pass_header X-Robots-Tag;
  }
}
