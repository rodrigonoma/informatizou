# Roteamento do Informatizou no nginx do HOST (deploy isolado em VPS compartilhada).
# Aponta os subdomínios para os apps isolados em 127.0.0.1 (docker-compose.vps.yml),
# sem afetar outros sites do servidor. Ativar SOMENTE após o DNS apontar para a VPS.
#
# Ativar:
#   ln -s /opt/informatizou/nginx-host-informatizou.conf /etc/nginx/sites-enabled/informatizou.conf
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d www.informatizou.com.br -d app.informatizou.com.br \
#           -d api.informatizou.com.br -d demo.informatizou.com.br

server {
  listen 80;
  server_name www.informatizou.com.br informatizou.com.br;
  location / {
    proxy_pass http://127.0.0.1:18030;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name app.informatizou.com.br;
  location / {
    proxy_pass http://127.0.0.1:18031;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name api.informatizou.com.br;
  client_max_body_size 20m;
  location / {
    proxy_pass http://127.0.0.1:18040;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name demo.informatizou.com.br;
  location / {
    proxy_pass http://127.0.0.1:18032;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_header X-Robots-Tag;
  }
}
